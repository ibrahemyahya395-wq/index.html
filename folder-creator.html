<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء مجلدات الشواهد</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #c2185b;
    --primary-light: #f48fb1;
    --bg-color: #fce4ec;
    --text-color: #2c1a1a;
    --white: #ffffff;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Tajawal', sans-serif;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-color);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container {
    background: var(--white);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(194, 24, 91, 0.1);
    width: 100%;
    max-width: 600px;
    text-align: center;
  }

  h1 {
    color: var(--primary);
    margin-bottom: 30px;
    font-size: 28px;
  }

  .form-group {
    margin-bottom: 20px;
    text-align: right;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #eee;
    border-radius: 10px;
    font-size: 16px;
    transition: border-color 0.3s;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: var(--primary-light);
  }

  .radio-group {
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
    justify-content: center;
  }

  .radio-option {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
  }

  .radio-option input[type="radio"] {
    accent-color: var(--primary);
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  button {
    background: var(--primary);
    color: var(--white);
    border: none;
    padding: 12px 30px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
    width: 100%;
  }

  button:hover {
    background: #ad1457;
  }

  button:active {
    transform: translateY(2px);
  }

  button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }

  .loader {
    display: none;
    margin: 20px auto;
    border: 4px solid #f3f3f3;
    border-top: 4px solid var(--primary);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .result-section {
    display: none;
    margin-top: 30px;
    padding-top: 30px;
    border-top: 1px solid #eee;
    text-align: right;
  }

  .result-link {
    display: block;
    margin-bottom: 20px;
    color: var(--primary);
    text-decoration: none;
    font-weight: bold;
    word-break: break-all;
    background: #fdf5f8;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
  }

  /* Individual Result Styles */
  .individual-result {
    display: none;
    text-align: center;
  }

  .qr-container-single {
    margin-top: 10px;
    background: #fff;
    padding: 10px;
    border: 1px solid #eee;
    border-radius: 10px;
    display: inline-block;
  }

  .qr-container-single img {
    display: block;
    max-width: 100%;
    height: auto;
  }

  /* Performance Result Styles */
  .performance-result {
    display: none;
  }

  .perf-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
  }

  .perf-item {
    display: flex;
    align-items: center;
    gap: 15px;
    background: #f9f9f9;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #eee;
  }

  .perf-item-qr {
    flex-shrink: 0;
    width: 80px;
    height: 80px;
    background: #fff;
    padding: 5px;
    border: 1px solid #ddd;
    border-radius: 8px;
  }

  .perf-item-qr img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .perf-item-title {
    font-size: 16px;
    font-weight: bold;
    color: var(--text-color);
  }

  .copy-btn {
    background: #4caf50;
    margin-top: 20px;
  }

  .copy-btn:hover {
    background: #388e3c;
  }

  .message {
    margin-top: 15px;
    font-size: 14px;
    color: #4caf50;
    display: none;
    text-align: center;
  }
  
  .error-message {
    margin-top: 15px;
    font-size: 14px;
    color: #f44336;
    display: none;
    word-wrap: break-word;
    text-align: center;
  }

  #hidden-clipboard {
    position: absolute;
    left: -9999px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>إنشاء مجلدات الشواهد 🌸</h1>
  
  <div class="radio-group">
    <label class="radio-option">
      <input type="radio" name="reportType" value="individual" checked onchange="updateLabel()">
      تقرير فردي
    </label>
    <label class="radio-option">
      <input type="radio" name="reportType" value="performance" onchange="updateLabel()">
      ملف أداء
    </label>
  </div>

  <div class="form-group">
    <label id="nameLabel" for="folderName">اسم المجلد:</label>
    <input type="text" id="folderName" placeholder="أدخل الاسم هنا..." required>
  </div>
  
  <button id="submitBtn" onclick="createFolder()">إنشاء المجلدات</button>
  
  <div class="loader" id="loader"></div>
  <div class="error-message" id="errorMessage"></div>

  <div class="result-section" id="resultSection">
    <h3 style="text-align: center;">تم الإنشاء بنجاح! 🎉</h3>
    <br>
    
    <!-- INDIVIDUAL REPORT RESULT -->
    <div id="individualResult" class="individual-result">
      <label>رابط المجلد:</label>
      <a href="#" target="_blank" class="result-link" id="indFolderLink">اضغط هنا لفتح المجلد</a>
      
      <label>رمز الـ QR (مرتبط بالرابط):</label>
      <br>
      <div class="qr-container-single" id="indQrContainer">
        <a href="#" target="_blank" id="indQrLink">
          <img id="indQrImage" src="" alt="QR Code">
        </a>
      </div>
      <button class="copy-btn" onclick="copyIndividualQR()">نسخ الرمز المربع (QR) 📋</button>
    </div>

    <!-- PERFORMANCE REPORT RESULT -->
    <div id="performanceResult" class="performance-result">
      <label>رابط المجلد الرئيسي (ملف الأداء):</label>
      <a href="#" target="_blank" class="result-link" id="perfRootLink">اضغط هنا لفتح المجلد الرئيسي</a>
      
      <label>رموز الاستجابة السريعة للبنود الرئيسية:</label>
      <div class="perf-list" id="perfListContainer">
        <!-- يتم حقن المجلدات هنا -->
      </div>
      <button class="copy-btn" onclick="copyPerformanceQRs()">نسخ جميع الرموز المربعة (QR) 📋</button>
    </div>

    <div class="message" id="copyMessage">تم النسخ إلى الحافظة بنجاح! يمكنك اللصق الآن.</div>
  </div>
</div>

<script>
  // رابط السكربت 
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwozRUlCyolywyGKPz6JlPHoz-HEmGoPioTSk3Rmm4ye4cQ4ZMJwEOcgXkni1D0Y24uIw/exec";

  function updateLabel() {
    const type = document.querySelector('input[name="reportType"]:checked').value;
    const label = document.getElementById('nameLabel');
    const input = document.getElementById('folderName');
    
    if (type === 'performance') {
      label.textContent = "اسم المعلم (المجلد الرئيسي):";
      input.placeholder = "أدخل اسم المعلم هنا...";
    } else {
      label.textContent = "اسم المجلد:";
      input.placeholder = "أدخل اسم المجلد هنا...";
    }
  }

  async function createFolder() {
    const folderNameInput = document.getElementById('folderName');
    const folderName = folderNameInput.value.trim();
    const type = document.querySelector('input[name="reportType"]:checked').value;
    
    const btn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const resultSection = document.getElementById('resultSection');
    const errorMessage = document.getElementById('errorMessage');
    
    const individualResult = document.getElementById('individualResult');
    const performanceResult = document.getElementById('performanceResult');
    const copyMessage = document.getElementById('copyMessage');

    if (!folderName) {
      alert("الرجاء إدخال الاسم");
      return;
    }

    btn.disabled = true;
    loader.style.display = 'block';
    resultSection.style.display = 'none';
    individualResult.style.display = 'none';
    performanceResult.style.display = 'none';
    errorMessage.style.display = 'none';
    copyMessage.style.display = 'none';

    try {
      const response = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ 
            folderName: folderName,
            reportType: type
        }),
        headers: {
          "Content-Type": "text/plain;charset=utf-8",
        }
      });

      const textResult = await response.text();
      let result;
      try {
          result = JSON.parse(textResult);
      } catch(e) {
          throw new Error("حدث خطأ في الاتصال بالخادم. يرجى التأكد من صلاحيات الرابط.");
      }

      if (result.success) {
        if (result.type === 'individual') {
          // عرض الفردي
          document.getElementById('indFolderLink').href = result.folderUrl;
          document.getElementById('indFolderLink').textContent = result.folderUrl;
          document.getElementById('indQrImage').src = result.qrCodeUrl;
          document.getElementById('indQrLink').href = result.folderUrl;
          individualResult.style.display = 'block';
        } else if (result.type === 'performance') {
          // عرض الأداء
          document.getElementById('perfRootLink').href = result.rootFolderUrl;
          document.getElementById('perfRootLink').textContent = result.rootFolderUrl;
          
          const perfListContainer = document.getElementById('perfListContainer');
          perfListContainer.innerHTML = ''; // مسح القديم
          
          result.mainFolders.forEach(folder => {
            const itemHTML = `
              <div class="perf-item">
                <div class="perf-item-qr">
                  <a href="${folder.url}" target="_blank">
                    <img src="${folder.qrCodeUrl}" alt="${folder.name}">
                  </a>
                </div>
                <div class="perf-item-title">${folder.name}</div>
              </div>
            `;
            perfListContainer.innerHTML += itemHTML;
          });
          
          performanceResult.style.display = 'block';
        }

        resultSection.style.display = 'block';
        folderNameInput.value = ''; 
      } else {
        throw new Error(result.error || "حدث خطأ غير معروف");
      }
    } catch (error) {
      errorMessage.textContent = "خطأ: " + error.message;
      errorMessage.style.display = 'block';
    } finally {
      btn.disabled = false;
      loader.style.display = 'none';
    }
  }

  function copyIndividualQR() {
    const qrContainer = document.getElementById('indQrContainer');
    performCopy(qrContainer);
  }

  function copyPerformanceQRs() {
    const listContainer = document.getElementById('perfListContainer');
    performCopy(listContainer);
  }

  function performCopy(element) {
    const copyMessage = document.getElementById('copyMessage');
    const selection = window.getSelection();
    const range = document.createRange();
    
    range.selectNodeContents(element);
    selection.removeAllRanges();
    selection.addRange(range);
    
    try {
      document.execCommand('copy');
      copyMessage.style.display = 'block';
      setTimeout(() => {
        copyMessage.style.display = 'none';
      }, 3000);
    } catch (err) {
      console.error('فشل النسخ', err);
      alert('فشل نسخ الرمز، يرجى المحاولة يدوياً');
    }
    
    selection.removeAllRanges();
  }
</script>

</body>
</html>
